name: Sync NeoDB data and Deploy Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "23 2 * * *" # 每天跑一次（UTC）

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch NeoDB -> public/index.json (+ simple index.html)
        env:
          NEODB_TOKEN: ${{ secrets.NEODB_TOKEN }}
          NEODB_BASE: https://neodb.social
        run: |
          python - <<'PY'
          import os, json, time
          from datetime import datetime, timezone
          import requests

          base = os.getenv("NEODB_BASE", "https://neodb.social").rstrip("/")
          token = os.environ["NEODB_TOKEN"]

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/json",
              "User-Agent": "neodb-sync-github-actions"
          }

          def fetch_all(shelf: str, category: str):
              # NeoDB shelf 类型常见：wishlist / progress / complete；category 包含 podcast/movie/tv/book/game 等 :contentReference[oaicite:3]{index=3}
              items = []
              page = 1
              while True:
                  url = f"{base}/api/me/shelf/{shelf}?category={category}&page={page}"
                  r = requests.get(url, headers=headers, timeout=30)
                  if r.status_code != 200:
                      raise SystemExit(f"Request failed: {r.status_code} {r.text[:2000]}")
                  data = r.json()
                  page_items = data.get("data") or []
                  if not page_items:
                      break
                  for it in page_items:
                      it["_shelf"] = shelf
                      it["_category"] = category
                  items.extend(page_items)
                  page += 1
                  time.sleep(0.2)
              return items


          # - 书/影/游：complete
          # - 听：podcast 只显示在听 => progress
          bundles = []
          bundles += fetch_all("complete", "book")
          bundles += fetch_all("complete", "movie")
          bundles += fetch_all("complete", "tv")
          bundles += fetch_all("complete", "game")
          bundles += fetch_all("progress", "podcast")

          out = {
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "source": {"base": base},
              "count": len(bundles),
              "items": bundles
          }

          os.makedirs("public", exist_ok=True)
          with open("public/index.json", "w", encoding="utf-8") as f:
              json.dump(out, f, ensure_ascii=False, indent=2)

          # 给 Pages 一个“可访问的首页”，否则访问根路径可能是 404（但 JSON 依然可访问）
          with open("public/index.html", "w", encoding="utf-8") as f:
              f.write("""<!doctype html>
          <meta charset="utf-8">
          <title>NeoDB Media Data</title>
          <h1>NeoDB Media Data</h1>
          <p><a href="./index.json">index.json</a></p>
          """)

          # 禁用 Jekyll（避免某些路径/文件被特殊处理）
          with open("public/.nojekyll", "w", encoding="utf-8") as f:
              f.write("")

          print("Wrote public/index.json items:", len(bundles))
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
