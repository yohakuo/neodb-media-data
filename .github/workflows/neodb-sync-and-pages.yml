name: Sync NeoDB data and Deploy Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "23 2 * * *"  # 每天 UTC 02:23（北京时间 10:23）

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch NeoDB -> public/index.json
        env:
          NEODB_TOKEN: ${{ secrets.NEODB_TOKEN }}
          NEODB_BASE: https://neodb.social
        run: |
          python - <<'PY'
          import os, json, time
          from datetime import datetime, timezone
          import requests

          base = os.getenv("NEODB_BASE").rstrip("/")
          token = os.environ["NEODB_TOKEN"]

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/json",
              "User-Agent": "neodb-sync"
          }

          def fetch_all(shelf, category):
              items = []
              page = 1
              while True:
                  url = f"{base}/api/me/shelf/{shelf}?category={category}&page={page}"
                  r = requests.get(url, headers=headers, timeout=30)

                  if r.status_code != 200:
                      raise SystemExit(r.text)

                  data = r.json().get("data") or []

                  if not data:
                      break

                  items.extend(data)

                  page += 1
                  time.sleep(0.2)

              return items

          bundles = []

          bundles += fetch_all("complete", "book")
          bundles += fetch_all("complete", "movie")
          bundles += fetch_all("complete", "tv")
          bundles += fetch_all("complete", "game")
          bundles += fetch_all("progress", "podcast")

          out = {
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "count": len(bundles),
              "items": bundles
          }

          os.makedirs("public", exist_ok=True)

          with open("public/index.json", "w", encoding="utf-8") as f:
              json.dump(out, f, ensure_ascii=False, indent=2)

          with open("public/index.html", "w", encoding="utf-8") as f:
              f.write(
                  "<meta charset='utf-8'>"
                  "<h1>NeoDB Media Data</h1>"
                  "<a href='./index.json'>index.json</a>"
              )

          open("public/.nojekyll", "w").close()

          print("Items:", len(bundles))
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        uses: actions/deploy-pages@v4

      - name: Keepalive commit
        if: github.event_name == 'schedule'
        run: |
          date > .keepalive

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .keepalive

          git commit -m "keepalive" || echo "No changes"

          git push