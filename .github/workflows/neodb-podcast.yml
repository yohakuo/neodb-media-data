name: Sync NeoDB Podcast (progress)

on:
  workflow_dispatch:
  schedule:
    - cron: "23 2 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch NeoDB shelf (podcast progress) -> index.json
        env:
          NEODB_TOKEN: ${{ secrets.NEODB_TOKEN }}
          NEODB_BASE: https://neodb.social
        run: |
          python - <<'PY'
          import os, json, time, requests
          from datetime import datetime, timezone

          base = os.getenv("NEODB_BASE","https://neodb.social").rstrip("/")
          token = os.environ["NEODB_TOKEN"]

          # progress（正在听）
          url_tpl = f"{base}/api/me/shelf/progress?category=podcast&page={{page}}"

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/json",
              "User-Agent": "neodb-sync-github-actions"
          }

          items = []
          page = 1
          while True:
              r = requests.get(url_tpl.format(page=page), headers=headers, timeout=30)
              if r.status_code != 200:
                  raise SystemExit(f"Request failed: {r.status_code} {r.text[:2000]}")
              data = r.json()
              page_items = data.get("data") or []
              if not page_items:
                  break
              items.extend(page_items)
              page += 1
              time.sleep(0.2)

          out = {
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "source": {"base": base, "shelf": "progress", "category": "podcast"},
              "count": len(items),
              "items": items
          }

          with open("index.json","w",encoding="utf-8") as f:
              json.dump(out, f, ensure_ascii=False, indent=2)

          print("Wrote index.json:", len(items))
          PY

      - name: Commit & push if changed
        run: |
          if git diff --quiet -- index.json; then
            echo "No changes in index.json"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          git commit -m "chore: sync neodb podcast progress"
          git push
